name: Build AppImage

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-appimage:
    if: github.repository_owner == 'anki-code'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PYTHON_VER: 3.11
      
    steps:
      - uses: actions/checkout@v6

      - name: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install packages from apt
        run: |
          uname -a
          sudo apt install -y curl git vim patchelf elfutils binutils-common binutils

      - name: Install mamba
        run: |
          yes | bash -c "$(curl -L https://micro.mamba.pm/install.sh)"
          /home/runner/.local/bin/micromamba info

      - name: Activate mamba and install packages
        run: |
          eval "$(/home/runner/.local/bin/micromamba shell hook -s bash)" \
             && micromamba activate base \
             && micromamba install -y -c conda-forge libpython-static==$PYTHON_VER gcc ccache \
             && pip install -U pip setuptools wheel certifi \
             && pip install '.[full]' ujson pygments prompt_toolkit pyperclip \
             && pip install xontrib-sh xontrib-prompt-starship \
             && pip install git+https://github.com/Nuitka/Nuitka@factory

      - name: Activate mamba and test xonsh
        run: |
          eval "$(/home/runner/.local/bin/micromamba shell hook -s bash)" \
             && micromamba activate base \
             && xonsh --version \
             && xonsh -c '21+21'

      - name: Activate mamba and run Nuitka build
        run: |
          eval "$(/home/runner/.local/bin/micromamba shell hook -s bash)" \
             && micromamba activate base \
             && nuitka --version \
             && nuitka \
                  --standalone \
                  --onefile \
                  --static-libpython=yes \
                  --no-deployment-flag=self-execution \
                  --onefile-tempdir-spec='%TEMP%/onefile_%PID%_%TIME%' \
                  --show-progress \
                  --show-scons \
                  --show-modules \
                  --assume-yes-for-downloads \
                  --jobs=2 \
                  --include-package=pip \
                  --include-package=setuptools \
                  --include-package=wheel \
                  --include-package=certifi \
                  --include-package-data=certifi \
                  --include-module=ujson \
                  --include-package=pygments \
                  --include-package=prompt_toolkit \
                  --include-module=pyperclip \
                  /home/runner/micromamba/lib/python$PYTHON_VER/site-packages/xonsh

      - name: Rename binary file
        run: |
          ls -lah xonsh.bin
          ./xonsh.bin --version
          mv xonsh.bin xonsh-py$PYTHON_VER-glibc-$(uname -m).bin

      - name: Get latest release upload URL
        id: get_release
        uses: actions/github-script@v7
        with:
          script: |
            const { data: release } = await github.rest.repos.getLatestRelease({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            core.setOutput('upload_url', release.upload_url);
            core.setOutput('tag_name', release.tag_name);

      - name: Upload xonsh AppImage to latest release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_path: ./xonsh-x86_64.AppImage
          asset_name: xonsh-x86_64.AppImage
          asset_content_type: application/x-executable
